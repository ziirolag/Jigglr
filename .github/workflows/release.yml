# Required repository secrets:
# - BUILD_CERTIFICATE_BASE64: Base64-encoded Apple Distribution certificate (.p12) for app signing.
# - INSTALLER_CERTIFICATE_BASE64: Base64-encoded Mac Installer Distribution certificate (.p12) for pkg signing.
# - P12_PASSWORD: Password used to decrypt both .p12 certificate files.
# - KEYCHAIN_PASSWORD: Temporary keychain password used during CI signing.
# - ASC_API_KEY_ID: App Store Connect API key ID.
# - ASC_API_ISSUER_ID: App Store Connect API issuer ID.
# - ASC_API_KEY_BASE64: Base64-encoded App Store Connect private API key (.p8).
name: Release macOS to App Store Connect

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    env:
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
      ASC_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
      KEYCHAIN_PATH: ${{ runner.temp }}/build-signing.keychain-db
      BUILD_CERT_PATH: ${{ runner.temp }}/build_certificate.p12
      INSTALLER_CERT_PATH: ${{ runner.temp }}/installer_certificate.p12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain and OS version
        shell: bash
        run: |
          echo "===> Xcode and macOS version"
          xcodebuild -version
          sw_vers

      - name: Decode certificates and App Store Connect API key
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          INSTALLER_CERTIFICATE_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          echo "===> Decoding signing materials"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$BUILD_CERT_PATH"
          echo "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$ASC_API_KEY_PATH"
          chmod 600 "$ASC_API_KEY_PATH"

      - name: Create keychain and import certificates
        shell: bash
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "===> Creating temporary keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "===> Importing signing certificates"
          security import "$BUILD_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/xcodebuild
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/xcodebuild

          echo "===> Setting keychain search list"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive app
        shell: bash
        run: |
          set -euo pipefail
          echo "===> Archiving app"
          mkdir -p build
          xcodebuild \
            -project MouseMove.xcodeproj \
            -scheme MouseMove \
            -configuration Release-AppStore \
            -destination 'generic/platform=macOS' \
            -archivePath build/Jigglr.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            archive

      - name: Export archive
        shell: bash
        run: |
          set -euo pipefail
          echo "===> Exporting archive"
          xcodebuild \
            -exportArchive \
            -archivePath build/Jigglr.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"
          ls -la build/export

      - name: Upload to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          echo "===> Uploading package to App Store Connect"
          PKG_PATH="build/export/Jigglr.pkg"
          if [[ ! -f "$PKG_PATH" ]]; then
            PKG_PATH="$(find build/export -maxdepth 1 -type f -name '*.pkg' | head -n 1)"
          fi
          if [[ -z "${PKG_PATH:-}" || ! -f "$PKG_PATH" ]]; then
            echo "No .pkg found in build/export"
            exit 1
          fi
          echo "Using package: $PKG_PATH"

          if xcrun --find altool >/dev/null 2>&1; then
            echo "Using altool"
            xcrun altool --upload-app -f "$PKG_PATH" -t macos --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID"
          elif xcrun --find iTMSTransporter >/dev/null 2>&1; then
            echo "altool not found; using iTMSTransporter"
            xcrun iTMSTransporter -m upload -assetFile "$PKG_PATH" -apiKey "$ASC_API_KEY_ID" -apiIssuer "$ASC_API_ISSUER_ID"
          else
            echo "Neither altool nor iTMSTransporter is available on this runner."
            exit 1
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jigglr-release-artifacts
          if-no-files-found: warn
          path: |
            build/export
            build/Jigglr.xcarchive

      - name: Delete temporary keychain
        if: always()
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set +e
          echo "===> Cleaning up temporary keychain and sensitive files"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          rm -f "$BUILD_CERT_PATH" "$INSTALLER_CERT_PATH" "$ASC_API_KEY_PATH"
